kibot:
  version: 1

global:
  kicad_dnp_applies_to_3D: true

import:
  - file: JLCPCB
  - file: PCBWay

preflight:
  erc:
    enabled: true
  drc:
    enabled: false
  check_zone_fills: false
  set_text_variables:
    name: GIT_HASH
    command: git rev-parse --short HEAD

outputs:
  - name: basic_boardview
    comment: Board View export
    type: boardview
    dir: Assembly

  - name: generic_bom_html
    comment: Generic Bill of Materials in HTML format
    type: bom
    dir: BoM
    options:
      format: HTML

  - name: basic_ibom
    comment: Interactive Bill of Materials
    type: ibom
    dir: Assembly

  - name: basic_pdf_sch
    comment: Schematic PDF
    type: pdf_sch_print
    dir: Schematic

  - name: basic_pcb_print
    comment: PCB print
    type: pcb_print
    dir: PCB
    options:
      pages:
        - layers: [F.Cu, F.SilkS, Edge.Cuts]
          sheet: Front copper
        - layers: [In1.Cu, Edge.Cuts]
          sheet: Inner 1 (GND)
        - layers: [In2.Cu, Edge.Cuts]
          sheet: Inner 2 (GND)
        - layers: [B.Cu, B.SilkS, Edge.Cuts]
          sheet: Back copper

  - name: basic_blender_export
    comment: 3D view from top/30 deg/bottom (Blender)
    type: blender_export
    dir: 3D
    options:
      pcb3d: _PCB2Blender_2_1
      outputs:
        - type: render
        - type: blender
      point_of_view:
        - view: top
        - rotate_x: 30
          rotate_z: -20
          file_id: _30deg
        - view: bottom

  - name: basic_navigate
    comment: Web page to navigate the outputs
    type: navigate_results
    dir: Browse
