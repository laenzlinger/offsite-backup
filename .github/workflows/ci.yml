name: "Hardware CI"

on:
  push:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"

jobs:
  generate:
    name: Generate Outputs
    runs-on: ubuntu-latest
    # TODO: switch to kicad10_auto when available and remove workaround
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      - name: KiCad 10 compatibility workaround
        working-directory: hardware
        run: |
          # Strip KiCad 10 attributes not recognized by KiCad 9 KiBot
          find . -name "*.kicad_sch" -o -name "*.kicad_sym" | \
            xargs sed -i '/\bin_pos_files\b/d; /\bduplicate_pin_numbers_are_jumpers\b/d'
      - name: KiBot
        working-directory: hardware
        run: |
          kibot -e granit.kicad_sch -b granit.kicad_pcb -d generated
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: generated_outputs
          path: hardware/generated
