name: "Hardware CI"

on:
  push:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

jobs:
  generate:
    name: Generate Outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: "0"

      - name: Install KiCad 10 + KiBot dev
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends kicad python3-lxml
          pip install --break-system-packages --no-compile git+https://github.com/INTI-CMNB/KiBot.git@dev

      - name: KiBot
        working-directory: hardware
        run: |
          kibot -e granit.kicad_sch -b granit.kicad_pcb -d generated

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: generated_outputs
          path: hardware/generated

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: hardware/generated
