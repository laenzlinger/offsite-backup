name: "Hardware CI"

on:
  push:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"

jobs:
  generate:
    name: Generate Outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Install KiCad 10
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends kicad

      - name: Generate schematic PDF
        working-directory: hardware
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          mkdir -p generated
          kicad-cli sch export pdf \
            --define-var GIT_HASH=$GIT_HASH \
            --output generated/granit-schematic.pdf \
            granit.kicad_sch

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: generated_outputs
          path: hardware/generated
