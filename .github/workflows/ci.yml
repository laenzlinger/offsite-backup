name: "Hardware CI"

on:
  push:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/ci.yml"

jobs:
  generate:
    name: Generate Outputs
    runs-on: ubuntu-latest
    # TODO: switch to kicad10_auto when available
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      - name: KiBot
        working-directory: hardware
        run: |
          kibot -e granit.kicad_sch -b granit.kicad_pcb -d generated
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: generated_outputs
          path: hardware/generated
